version: '3.8'

services:
  # 1. MariaDB Database
  db:
    image: mariadb:10.6
    container_name: room-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: room_password_2026
      MYSQL_DATABASE: room_booking
      MYSQL_USER: room_user
      MYSQL_PASSWORD: room_password_2026
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - room-network

  # 2. PHP Web Application
  app:
    build: .
    container_name: room-app
    restart: always
    ports:
      - "8081:80" # เข้าใช้งานผ่าน http://192.168.1.202:8081
    environment:
      DB_HOST: db
      DB_NAME: room_booking
      DB_USER: room_user
      DB_PASS: room_password_2026
    depends_on:
      - db
    networks:
      - room-network

networks:
  room-network:
    driver: bridge
